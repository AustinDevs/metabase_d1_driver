name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  METABASE_VERSION: v0.62.4

jobs:
  build-driver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: DeLaGuardo/setup-clojure@13.6
        with:
          cli: latest

      - name: Cache Metabase build dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: mb-build-deps-${{ env.METABASE_VERSION }}

      - name: Clone Metabase and register driver
        run: |
          git clone --depth 1 --branch "$METABASE_VERSION" https://github.com/metabase/metabase.git ../metabase
          ln -s "$GITHUB_WORKSPACE" ../metabase/modules/drivers/d1
          python3 - <<'EOF'
          import pathlib
          p = pathlib.Path("../metabase/modules/drivers/deps.edn")
          s = p.read_text()
          if "metabase/d1" not in s:
              s = s.replace(" :deps\n {", ' :deps\n {metabase/d1                 {:local/root "d1"}\n  ', 1)
              p.write_text(s)
          print(s[:600])
          EOF

      - name: Build driver JAR
        working-directory: ../metabase
        run: ./bin/build-driver.sh d1

      - uses: actions/upload-artifact@v7
        with:
          name: d1-driver-jar
          path: ../metabase/resources/modules/d1.metabase-driver.jar
          if-no-files-found: error

  e2e-mock:
    name: e2e (local D1 emulator)
    runs-on: ubuntu-latest
    needs: build-driver
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/download-artifact@v8
        with:
          name: d1-driver-jar
          path: plugins

      - name: Cache Metabase uberjar
        id: mb-jar
        uses: actions/cache@v6
        with:
          path: metabase.jar
          key: metabase-jar-${{ env.METABASE_VERSION }}

      - name: Download Metabase
        if: steps.mb-jar.outputs.cache-hit != 'true'
        run: curl -fsSL -o metabase.jar "https://downloads.metabase.com/${METABASE_VERSION}/metabase.jar"

      - name: Seed local SQLite database
        run: |
          python3 - <<'EOF'
          import sqlite3, pathlib
          conn = sqlite3.connect("d1.sqlite")
          conn.executescript(pathlib.Path("test/seed.sql").read_text())
          conn.commit()
          EOF

      - name: Start D1 emulator
        run: |
          python3 test/d1_mock_server.py --port 8787 --db d1.sqlite \
            --account-id test-account --database-id test-db --token test-token \
            > d1-mock.log 2>&1 &

      - name: Start Metabase
        run: |
          MB_JETTY_PORT=3000 MB_PLUGINS_DIR="$PWD/plugins" java -jar metabase.jar > metabase.log 2>&1 &

      - name: Run e2e test
        env:
          MB_URL: http://localhost:3000
          D1_ACCOUNT_ID: test-account
          D1_DATABASE_ID: test-db
          D1_API_TOKEN: test-token
          D1_API_BASE_URL: http://127.0.0.1:8787
        run: python3 test/e2e_test.py

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== metabase.log (tail) ==="; tail -100 metabase.log || true
          echo "=== d1-mock.log ==="; cat d1-mock.log || true

  e2e-real-d1:
    name: e2e (real Cloudflare D1)
    runs-on: ubuntu-latest
    needs: build-driver
    # only runs when Cloudflare secrets are configured (skipped on forks)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check for Cloudflare secrets
        id: creds
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets not configured; skipping real-D1 e2e."
          fi

      - uses: actions/checkout@v7
        if: steps.creds.outputs.available == 'true'

      - uses: actions/setup-java@v5
        if: steps.creds.outputs.available == 'true'
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/download-artifact@v8
        if: steps.creds.outputs.available == 'true'
        with:
          name: d1-driver-jar
          path: plugins

      - name: Cache Metabase uberjar
        id: mb-jar
        if: steps.creds.outputs.available == 'true'
        uses: actions/cache@v6
        with:
          path: metabase.jar
          key: metabase-jar-${{ env.METABASE_VERSION }}

      - name: Download Metabase
        if: steps.creds.outputs.available == 'true' && steps.mb-jar.outputs.cache-hit != 'true'
        run: curl -fsSL -o metabase.jar "https://downloads.metabase.com/${METABASE_VERSION}/metabase.jar"

      - name: Create and seed ephemeral D1 database
        id: d1
        if: steps.creds.outputs.available == 'true'
        run: |
          DB_NAME="metabase-e2e-${{ github.run_id }}"
          CREATE=$(curl -fsSL -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" \
            -d "{\"name\": \"${DB_NAME}\"}")
          DB_ID=$(echo "$CREATE" | python3 -c "import json,sys; print(json.load(sys.stdin)['result']['uuid'])")
          echo "db-id=$DB_ID" >> "$GITHUB_OUTPUT"
          SEED=$(python3 -c "import json,pathlib; print(json.dumps({'sql': pathlib.Path('test/seed.sql').read_text()}))")
          curl -fsSL -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${DB_ID}/query" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" \
            -d "$SEED" > /dev/null

      - name: Start Metabase
        if: steps.creds.outputs.available == 'true'
        run: |
          MB_JETTY_PORT=3000 MB_PLUGINS_DIR="$PWD/plugins" java -jar metabase.jar > metabase.log 2>&1 &

      - name: Run e2e test
        if: steps.creds.outputs.available == 'true'
        env:
          MB_URL: http://localhost:3000
          D1_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ steps.d1.outputs.db-id }}
          D1_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 test/e2e_test.py

      - name: Delete ephemeral D1 database
        if: always() && steps.d1.outputs.db-id != ''
        run: |
          curl -fsSL -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${{ steps.d1.outputs.db-id }}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" > /dev/null || true

      - name: Dump logs on failure
        if: failure()
        run: tail -100 metabase.log || true
